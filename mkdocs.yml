site_name: Nemotron-Personas-Korea Audit
site_description: >-
  Independent joint-distribution & dependency-structure audit of NVIDIA's
  Nemotron-Personas-Korea synthetic dataset (한국어 본문 + English abstract).
site_url: https://eopchang.github.io/nemotron-personas-korea-audit/
site_author: Chang-Eop Kim

repo_name: eopchang/nemotron-personas-korea-audit
repo_url: https://github.com/eopchang/nemotron-personas-korea-audit
# edit_uri 는 _site_src 가 임시 디렉토리이므로 의미 없음 — 비활성화

# _site_src 는 빌드 직전에 scripts/build_site_src.sh 가 만든다
# (repo 루트 .md + reports/ + docs/ + review/ + 이미지를 모은다)
docs_dir: _site_src
site_dir: site

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans KR
    code: JetBrains Mono

nav:
  - 한 페이지 요약: index.md
  - English Summary: ABSTRACT_EN.md
  - 가이드:
      - 연구자 가이드: docs/RESEARCHER_GUIDE.md
      - 읽기 가이드: docs/READING_GUIDE.md
      - FAQ: docs/FAQ.md
      - 용어 사전: docs/GLOSSARY.md
      - 방법론: docs/METHODOLOGY.md
  - 리포트:
      - Phase 1 — 단변량: reports/PHASE1_REPORT.md
      - Phase 2 — 이변량: reports/PHASE2_REPORT.md
      - Phase 3 — PGM 구조: reports/PHASE3_REPORT.md
      - 55-pair 색인: reports/PAIR_INDEX.md
      - KOSIS 비교표: reports/tables/kosis_comparison.md
  - 외부 리뷰:
      - 개요: review/README.md
      - 주장 목록 (Claims): review/CLAIMS_LEDGER.md
      - Review Prompts (KR): review/REVIEW_PROMPTS.md
      - Review Prompts (EN): review/REVIEW_PROMPTS_EN.md
  - 메타:
      - 로드맵: ROADMAP.md
      - 기여 가이드: CONTRIBUTING.md

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

strict: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eopchang/nemotron-personas-korea-audit
  generator: false
