name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'reports/figures/**'
      - 'scripts/build_site_src.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write  # mkdocs gh-deploy pushes to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gh-deploy needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-mkdocs-${{ hashFiles('.github/workflows/docs.yml') }}

      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mkdocs-material>=9.5" \
            "pymdown-extensions>=10.0"

      - name: Assemble site source
        run: bash scripts/build_site_src.sh

      - name: Build & deploy to gh-pages
        run: mkdocs gh-deploy --force --verbose
